<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180">
  <defs>
    <linearGradient id="bgGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#081224;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#0a1830;stop-opacity:1" />
    </linearGradient>
  </defs>
  <!-- Background -->
  <rect width="180" height="180" fill="url(#bgGradient)"/>
  
  <!-- Ticket icon in cyan/turquoise -->
  <g transform="translate(45, 45)">
    <!-- Outer ticket -->
    <rect x="0" y="10" width="90" height="60" rx="8" fill="none" stroke="#18cbff" stroke-width="3"/>
    
    <!-- Ticket holes (perforations) -->
    <circle cx="12" cy="25" r="2.5" fill="#18cbff"/>
    <circle cx="12" cy="40" r="2.5" fill="#18cbff"/>
    <circle cx="12" cy="55" r="2.5" fill="#18cbff"/>
    
    <!-- Inner content -->
    <rect x="20" y="15" width="65" height="50" rx="4" fill="#18cbff" opacity="0.15"/>
    
    <!-- Accent element -->
    <line x1="25" y1="35" x2="75" y2="35" stroke="#18cbff" stroke-width="2" stroke-linecap="round"/>
    <line x1="25" y1="48" x2="65" y2="48" stroke="#18cbff" stroke-width="2" stroke-linecap="round" opacity="0.7"/>
  </g>
</svg>
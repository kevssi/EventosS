<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panel Administrativo - Sistema de Eventos</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/admin.css">
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="../index.html" class="navbar-brand"><span class="navbar-logo-mark" aria-hidden="true"></span><span class="navbar-logo-text">eventos+</span></a>
                <ul class="navbar-menu">
                    <li><a href="admin-dashboard.html">Panel Admin</a></li>
                </ul>
                <div class="navbar-user"></div>
            </div>
        </div>
    </nav>

    <!-- Header -->
    <div class="admin-header">
        <div class="container">
            <h1>Panel Administrativo</h1>
            <p>Gestiona eventos, usuarios y reportes del sistema</p>
        </div>
    </div>

    <!-- Contenido -->
    <div class="container">
        <!-- Tabs -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="dashboard">📊 Dashboard</button>
            <button class="tab-btn" data-tab="usuarios">👥 Usuarios</button>
            <button class="tab-btn" data-tab="solicitudes">📝 Solicitudes Organizador</button>
            <button class="tab-btn" data-tab="crearAdmin">➕ Agregar Admin</button>
            <button class="tab-btn" data-tab="passwordAdmin">🔐 Password Admin</button>
        </div>

        <!-- Dashboard -->
        <div class="tab-content active" id="tabDashboard">
            <div id="contenidoDashboard"></div>
        </div>

        <!-- Usuarios -->
        <div class="tab-content" id="tabUsuarios">
            <div id="contenidoUsuarios"></div>
        </div>

        <!-- Solicitudes -->
        <div class="tab-content" id="tabSolicitudes">
            <div id="contenidoSolicitudes"></div>
        </div>

        <!-- Crear Admin -->
        <div class="tab-content" id="tabCrearAdmin">
            <div id="contenidoCrearAdmin"></div>
        </div>

        <!-- Cambiar Password Admin -->
        <div class="tab-content" id="tabPasswordAdmin">
            <div id="contenidoPasswordAdmin"></div>
        </div>
    </div>

    <script src="../js/api.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/admin.js"></script>
</body>
</html>

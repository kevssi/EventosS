<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Eventos - Eventos+</title>
  <link rel="icon" type="image/svg+xml" href="../favicon.svg">
  <link rel="stylesheet" href="../css/global.css">
  <link rel="stylesheet" href="../css/navbar.css">
  <style>
    .mis-eventos-header {
      margin-bottom: 18px;
    }

    .mis-eventos-header p {
      color: var(--text-light);
      margin: 0;
    }

    .mis-eventos-grid {
      display: grid;
      gap: 14px;
      grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
      margin-bottom: 28px;
    }

    .evento-item {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 16px;
      box-shadow: var(--shadow);
    }

    .evento-item h3 {
      margin-bottom: 8px;
      font-size: 20px;
    }

    .evento-meta {
      display: grid;
      gap: 8px;
      color: var(--text-light);
      margin-bottom: 12px;
    }

    .evento-actions {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
    }

    @media (max-width: 560px) {
      .evento-actions .btn {
        width: 100%;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <div class="container">
      <div class="navbar-content">
        <a href="../index.html" class="navbar-brand"><span class="navbar-logo-mark" aria-hidden="true"></span><span class="navbar-logo-text">eventos+</span></a>
        <ul class="navbar-menu">
          <li><a href="../index.html">Inicio</a></li>
        </ul>
        <div class="navbar-user"></div>
      </div>
    </div>
  </nav>

  <div class="container" style="padding-top: 26px; padding-bottom: 28px;">
    <div class="mis-eventos-header">
      <h1>Mis Eventos</h1>
      <p>Aqui puedes ver los eventos que has organizado.</p>
    </div>

    <div id="misEventosContainer" class="mis-eventos-grid">
      <div class="card" style="text-align: center; padding: 26px; grid-column: 1 / -1;">
        <div class="loading"></div>
        <p style="margin-top: 10px;">Cargando tus eventos...</p>
      </div>
    </div>
  </div>

  <script src="../js/api.js"></script>
  <script src="../js/navbar.js"></script>
  <script src="../js/auth-guard.js"></script>
  <script>
    const MisEventosModule = {
      formatearFecha(value) {
        if (!value) return 'Fecha no disponible';
        const date = new Date(value);
        if (Number.isNaN(date.getTime())) return 'Fecha no disponible';
        return date.toLocaleString('es-MX', {
          day: '2-digit',
          month: 'long',
          year: 'numeric',
          hour: '2-digit',
          minute: '2-digit'
        });
      },

      estadoBadge(estado) {
        const value = (estado || '').toString().toLowerCase();
        if (value === 'publicado' || value === 'activo') return 'success';
        if (value === 'cancelado') return 'danger';
        return 'pending';
      },

      async cargar() {
        const container = document.querySelector('#misEventosContainer');
        if (!container) return;

        try {
          const response = await api.listarMisEventos();
          const eventos = response?.eventos || [];

          if (eventos.length === 0) {
            container.innerHTML = `
              <div class="card" style="text-align: center; padding: 24px; grid-column: 1 / -1;">
                <h3 style="margin-bottom: 8px;">Aun no tienes eventos</h3>
                <p style="color: var(--text-light); margin-bottom: 14px;">Crea tu primer evento para verlo aqui.</p>
                <a class="btn btn-primary" href="organizar-evento.html">Crear Evento</a>
              </div>
            `;
            return;
          }

          container.innerHTML = eventos.map((evento) => `
            <article class="evento-item">
              <h3>${evento.titulo || 'Evento sin titulo'}</h3>
              <div class="evento-meta">
                <p><span class="icon-label"><i data-lucide="calendar-days"></i><span>${this.formatearFecha(evento.fecha_inicio)}</span></span></p>
                <p><span class="icon-label"><i data-lucide="map-pin"></i><span>${evento.ubicacion || 'Ubicacion no definida'}</span></span></p>
                <p><span class="icon-label"><i data-lucide="ticket"></i><span>${Number(evento.boletos_disponibles || 0)} boletos disponibles</span></span></p>
                <p><span class="badge badge-${this.estadoBadge(evento.estado)}">${evento.estado || 'sin estado'}</span></p>
              </div>
              <div class="evento-actions">
                <a class="btn btn-primary" href="detalle-evento.html?id=${evento.id}">Ver Evento</a>
                <a class="btn btn-secondary" href="organizar-evento.html?id=${evento.id}">Editar</a>
              </div>
            </article>
          `).join('');

          window.NavbarModule?.renderLucideIcons?.(container);
        } catch (error) {
          container.innerHTML = `
            <div class="card" style="padding: 18px; grid-column: 1 / -1;">
              <div class="alert alert-error">
                <span><i data-lucide="triangle-alert"></i></span>
                <span>${error.message || 'No se pudieron cargar tus eventos'}</span>
              </div>
            </div>
          `;
          window.NavbarModule?.renderLucideIcons?.(container);
        }
      }
    };

    if (document.readyState === 'loading') {
      document.addEventListener('DOMContentLoaded', () => MisEventosModule.cargar());
    } else {
      MisEventosModule.cargar();
    }
  </script>
</body>
</html>

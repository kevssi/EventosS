<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Detalle de Boleto - Eventos+</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/boletos.css">
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="../index.html" class="navbar-brand"><span class="navbar-logo-mark" aria-hidden="true"></span><span class="navbar-logo-text">eventos+</span></a>
                <ul class="navbar-menu">
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="mis-boletos.html" style="color: var(--primary);">Mis Boletos</a></li>
                </ul>
                <div class="navbar-user"></div>
            </div>
        </div>
    </nav>

    <div class="container compra-container" style="padding-top: 24px; padding-bottom: 32px;">
        <div style="margin-bottom: 20px;">
            <a href="mis-boletos.html" style="color: var(--primary); text-decoration: none;"><span class="icon-label"><i data-lucide="arrow-left"></i><span>Volver a mis boletos</span></span></a>
        </div>

        <div id="detalleBoletoContainer" class="card">
            <div style="text-align: center; padding: 30px;">
                <div class="loading"></div>
                <p>Cargando detalle del boleto...</p>
            </div>
        </div>
    </div>

    <script src="../js/api.js?v=20260414b"></script>
    <script src="../js/navbar.js?v=20260414b"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="../js/boleto-pdf.js?v=20260414b"></script>
    <script>
        const DetalleBoletoModule = {
            abiertoDesdeQR: false,

            construirPayloadQR(boleto) {
                const codigo = String(boleto?.codigo_qr || '').trim();
                const id = encodeURIComponent(String(boleto?.boleto_id || boleto?.id_boleto || boleto?.id || ''));
                const qr = encodeURIComponent(codigo);

                if (!codigo) return '';

                const pagesIndex = window.location.pathname.lastIndexOf('/pages/');
                const appBasePath = pagesIndex >= 0 ? window.location.pathname.slice(0, pagesIndex) : '';
                const detalleUrl = `${window.location.origin}${appBasePath}/pages/detalle-boleto.html`;
                return `${detalleUrl}?id=${id}&qr=${qr}`;
            },

            esMovil() {
                return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');
            },

            async guardarQREnGaleria(qrPayload, nombreEvento) {
                if (!this.esMovil()) {
                    alert('Esta opción solo está disponible en celular.');
                    return;
                }

                try {
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=900x900&data=${encodeURIComponent(qrPayload || '')}`;
                    const response = await fetch(qrUrl);
                    if (!response.ok) {
                        throw new Error('No se pudo generar la imagen QR');
                    }

                    const blob = await response.blob();
                    const safeName = String(nombreEvento || 'evento')
                        .toLowerCase()
                        .replace(/[^a-z0-9]+/g, '-')
                        .replace(/^-+|-+$/g, '');
                    const fileName = `qr-${safeName || 'boleto'}.png`;

                    if (navigator.canShare && navigator.share && window.File) {
                        const qrFile = new File([blob], fileName, { type: 'image/png' });
                        const canShareFiles = navigator.canShare({ files: [qrFile] });

                        if (canShareFiles) {
                            await navigator.share({
                                title: 'QR de boleto',
                                text: 'Guarda este QR en tu galeria',
                                files: [qrFile]
                            });
                            return;
                        }
                    }

                    const imageUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = imageUrl;
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(imageUrl);
                } catch (error) {
                    alert(error.message || 'No se pudo guardar el QR');
                }
            },

            getBoletoId() {
                const params = new URLSearchParams(window.location.search);
                return params.get('id');
            },

            getBoletoQR() {
                const params = new URLSearchParams(window.location.search);
                return params.get('qr') || params.get('codigo_qr') || '';
            },

            formatDate(value) {
                if (!value) return 'No disponible';
                const date = new Date(value);
                if (Number.isNaN(date.getTime())) return 'No disponible';
                return date.toLocaleDateString('es-MX', {
                    weekday: 'long',
                    day: '2-digit',
                    month: 'long',
                    year: 'numeric'
                });
            },

            formatTime(value) {
                if (!value) return 'No disponible';
                const date = new Date(value);
                if (Number.isNaN(date.getTime())) return 'No disponible';
                return date.toLocaleTimeString('es-MX', {
                    hour: '2-digit',
                    minute: '2-digit'
                });
            },

            init() {
                const id = this.getBoletoId();
                const qr = this.getBoletoQR();

                if (qr) {
                    this.abiertoDesdeQR = true;
                    this.cargarDetallePorQR(qr);
                    return;
                }

                if (!id) {
                    this.mostrarError('No se recibió el ID del boleto.');
                    return;
                }

                this.cargarDetalle(id);
            },

            async cargarDetalle(id) {
                try {
                    const response = await api.detalleBoleto(id);
                    this.render(response.boleto || {});
                } catch (error) {
                    console.error('Error cargando detalle del boleto:', error);
                    this.mostrarError(error.message || 'No se pudo cargar el detalle del boleto.');
                }
            },

            async cargarDetallePorQR(qr) {
                try {
                    let response;

                    if (typeof api?.detalleBoletoPorQR === 'function') {
                        response = await api.detalleBoletoPorQR(qr);
                    } else {
                        const endpoint = `/api/boletos/detalle-qr?qr=${encodeURIComponent(String(qr || ''))}`;
                        const http = await fetch(endpoint);
                        const data = await http.json().catch(() => ({}));

                        if (!http.ok) {
                          throw new Error(data.error || 'No se pudo cargar el detalle por QR');
                        }

                        response = data;
                    }

                    this.render(response.boleto || {});
                } catch (error) {
                    console.error('Error cargando detalle del boleto por QR:', error);
                    this.mostrarError(error.message || 'No se pudo cargar el detalle del boleto por QR.');
                }
            },

            render(boleto) {
                const container = document.querySelector('#detalleBoletoContainer');
                if (!container) return;
                const qrPayload = this.construirPayloadQR(boleto);

                const estado = String(boleto.estado || 'desconocido').toLowerCase();
                const estadoClass = estado === 'pagado' || estado === 'activo' ? 'success' : 'warning';
                const fechaEvento = boleto.fecha_evento || boleto.fecha_inicio || boleto.fecha;
                const fechaCompra = boleto.fecha_compra || boleto.fecha_pago || boleto.fecha_emision;
                const referencia = boleto.referencia_externa || boleto.id_orden || boleto.orden_id || 'No disponible';

                container.innerHTML = `
                    ${this.abiertoDesdeQR ? `
                    <div style="margin: 20px 20px 0; padding: 14px 16px; border-radius: 12px; border: 1px solid rgba(108, 213, 255, 0.34); background: linear-gradient(140deg, rgba(8, 29, 61, 0.88), rgba(6, 22, 48, 0.88));">
                        <h1 style="margin: 0 0 6px; font-size: 26px; color: #f4fbff;">Gracias por comprar en eventos+</h1>
                        <p style="margin: 0; color: rgba(221, 240, 255, 0.9);">Aquí tienes la información de tu boleto.</p>
                    </div>
                    ` : ''}

                    <div class="card-header">
                        <h2 style="margin-bottom: 8px;">${boleto.evento || 'Boleto'}</h2>
                        <p style="color: var(--text-light); margin: 0;">Detalle completo de tu compra</p>
                    </div>

                    <div style="padding: 20px; display: grid; gap: 10px;">
                        <p><strong>Tipo de boleto:</strong> ${boleto.tipo_boleto || 'No disponible'}</p>
                        <p><strong>Ubicación:</strong> ${boleto.ubicacion || 'No disponible'}</p>
                        <p><strong>Fecha del evento:</strong> ${this.formatDate(fechaEvento)}</p>
                        <p><strong>Hora del evento:</strong> ${this.formatTime(fechaEvento)}</p>
                        <p><strong>Fecha de compra:</strong> ${this.formatDate(fechaCompra)}</p>
                        <p><strong>Hora de compra:</strong> ${this.formatTime(fechaCompra)}</p>
                        <p><strong>Precio pagado:</strong> $${Number(boleto.precio_pagado || boleto.precio || 0).toFixed(2)}</p>
                        <p><strong>Estado:</strong> <span class="badge badge-${estadoClass}">${boleto.estado || 'No disponible'}</span></p>
                        <p><strong>Referencia:</strong> ${referencia}</p>
                    </div>

                    <div style="margin: 0 20px 20px; padding: 16px; border-radius: 12px; border: 1px solid var(--border); background: rgba(255,255,255,0.03); text-align: center;">
                        <p style="margin-bottom: 10px; color: var(--text-light);">Código QR del boleto</p>
                        <img
                            src="https://api.qrserver.com/v1/create-qr-code/?size=220x220&data=${encodeURIComponent(qrPayload || boleto.codigo_qr || '')}"
                            alt="QR del boleto"
                            style="width: 180px; height: 180px; display: block; margin: 0 auto 10px; border-radius: 8px; background: #fff; padding: 8px;"
                        />
                        <code style="display: block; font-size: 15px; font-weight: 700; letter-spacing: 1px;">${boleto.codigo_qr || 'No disponible'}</code>
                    </div>

                    <div style="margin: 0 20px 20px; display: flex; justify-content: center;">
                        <button class="btn btn-primary" id="btnDescargarBoletoPdf">Descargar boleto PDF</button>
                        ${this.esMovil() ? `<button class="btn btn-secondary" id="btnGuardarQRGaleria" style="margin-left: 10px;">Guardar QR en galería</button>` : ''}
                    </div>
                `;

                const btnPdf = document.getElementById('btnDescargarBoletoPdf');
                if (btnPdf) {
                    btnPdf.addEventListener('click', async () => {
                        try {
                            await window.BoletoPdf.abrirPdfBoleto(boleto);
                        } catch (error) {
                            alert(error.message || 'No se pudo generar el PDF del boleto');
                        }
                    });
                }

                const btnQR = document.getElementById('btnGuardarQRGaleria');
                if (btnQR) {
                    btnQR.addEventListener('click', async () => {
                        await this.guardarQREnGaleria(qrPayload || boleto.codigo_qr || '', boleto.evento || 'evento');
                    });
                }

                window.NavbarModule?.renderLucideIcons?.(container);
            },

            mostrarError(mensaje) {
                const container = document.querySelector('#detalleBoletoContainer');
                if (!container) return;

                container.innerHTML = `
                    <div class="alert alert-error">
                        <span><i data-lucide="triangle-alert"></i></span>
                        <span>${mensaje}</span>
                    </div>
                `;

                window.NavbarModule?.renderLucideIcons?.(container);
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', () => DetalleBoletoModule.init());
        } else {
            DetalleBoletoModule.init();
        }
    </script>
</body>
</html>

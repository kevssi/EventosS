<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mis Boletos - Sistema de Eventos</title>
    <link rel="icon" type="image/svg+xml" href="../favicon.svg">
    <link rel="stylesheet" href="../css/global.css">
    <link rel="stylesheet" href="../css/navbar.css">
    <link rel="stylesheet" href="../css/boletos.css">
    <style>
        .mis-boletos-grid {
            grid-template-columns: repeat(3, minmax(0, 1fr));
            gap: 18px;
            align-items: stretch;
        }

        .boleto-card {
            width: 100%;
            max-width: none;
            margin: 0;
            height: 100%;
        }

        .boleto-card .card-header h3 {
            margin: 0;
            font-size: 26px;
            line-height: 1.2;
        }

        .boleto-body {
            padding: 16px;
        }

        .boleto-qr-box {
            margin: 16px auto 0;
            max-width: 320px;
            text-align: center;
            padding: 12px;
            background: #f0f9ff;
            border-radius: 8px;
        }

        .boleto-qr-image {
            width: 112px;
            height: 112px;
            display: block;
            margin: 0 auto 8px;
            border-radius: 8px;
            background: #fff;
            padding: 6px;
        }

        .boleto-actions {
            margin-top: 12px;
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }

        @media (max-width: 1200px) {
            .mis-boletos-grid {
                grid-template-columns: repeat(2, minmax(0, 1fr));
            }
        }

        @media (max-width: 768px) {
            .mis-boletos-grid {
                grid-template-columns: 1fr;
            }

            .boleto-card .card-header h3 {
                font-size: 22px;
            }

            .boleto-actions .btn {
                flex: 1 1 auto;
            }
        }
    </style>
</head>
<body>
    <!-- Navbar -->
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="../index.html" class="navbar-brand"><span class="navbar-logo-mark" aria-hidden="true"></span><span class="navbar-logo-text">eventos+</span></a>
                <ul class="navbar-menu">
                    <li><a href="../index.html">Inicio</a></li>
                    <li><a href="mis-boletos.html" style="color: var(--primary);">Mis Boletos</a></li>
                    <li><a href="mis-ordenes.html">Mis Órdenes</a></li>
                </ul>
                <div class="navbar-user"></div>
            </div>
        </div>
    </nav>

    <div class="container">
        <h1>Mis Boletos</h1>
        <p style="color: var(--text-light); margin-bottom: 30px;">Aquí están todos tus boletos comprados</p>

        <div id="mensajePagoPrueba" style="display:none; margin-bottom: 18px;"></div>

        <div id="boletosList" class="grid mis-boletos-grid">
            <div style="text-align: center; padding: 40px; grid-column: 1 / -1;">
                <div class="loading"></div>
                <p>Cargando boletos...</p>
            </div>
        </div>
    </div>

    <script>
        // Módulo para mis boletos
        const MisBoletosModule = {
            boletosPorId: {},

            construirPayloadQR(boleto) {
                const qrCode = String(boleto?.codigo_qr || '').trim();
                const id = String(boleto?.boleto_id || boleto?.id_boleto || boleto?.id || '').trim();
                const baseUrl = window.location.origin || 'https://eventos-s.vercel.app';

                if (qrCode) {
                    return `${baseUrl}/pages/detalle-boleto.html?qr=${encodeURIComponent(qrCode)}&src=qr`;
                }

                if (!id) return '';
                return `${baseUrl}/pages/detalle-boleto.html?id=${encodeURIComponent(id)}&src=qr`;
            },


            async procesarRetornoMercadoPagoSiAplica() {
                const params = new URLSearchParams(window.location.search);
                // Si viene de Stripe, no validar con MP
                const esStripe = params.get('stripe') === 'success' || 
                                 (!params.get('collection_id') && 
                                  !params.get('payment_id') && 
                                  !params.get('external_reference'));
                if (esStripe) return;
                const pago = (params.get('pago') || '').toLowerCase();
                const status = (params.get('status') || '').toLowerCase();
                const collectionStatus = (params.get('collection_status') || '').toLowerCase();
                const paymentId = params.get('payment_id') || params.get('collection_id');
                const externalReference = params.get('external_reference') || '';
                const box = document.getElementById('mensajePagoPrueba');
                if (!box) return;

                const vieneDeMercadoPago = Boolean(pago || status || collectionStatus || paymentId || externalReference);
                if (!vieneDeMercadoPago) return;

                try {
                    const response = await api.validarRetornoMercadoPago({
                        payment_id: paymentId || '',
                        status,
                        collection_status: collectionStatus,
                        external_reference: externalReference
                    });

                    const statusFinal = String(response?.status_final || '').toLowerCase();
                    const fueAprobado = statusFinal === 'aprobado';
                    const tipoAlerta = fueAprobado ? 'info' : 'warning';
                    const icon = fueAprobado ? 'circle-check' : 'triangle-alert';
                    const titulo = fueAprobado ? 'Pago confirmado' : 'Pago en proceso';
                    const mensaje = fueAprobado
                        ? 'Tu pago fue validado correctamente. Tus boletos pagados ya aparecen en esta sección.'
                        : 'Recibimos el retorno de Mercado Pago, pero el pago aún no está aprobado. Revisa el estado en Mis Órdenes.';

                    box.style.display = 'block';
                    box.innerHTML = `
                        <div class="alert alert-${tipoAlerta}" style="font-size: 15px;">
                            <span><i data-lucide="${icon}"></i></span>
                            <span>
                                <strong>${titulo}:</strong> ${mensaje}
                            </span>
                        </div>
                    `;

                    window.NavbarModule?.renderLucideIcons?.(box);
                } catch (error) {
                    box.style.display = 'block';
                    box.innerHTML = `
                        <div class="alert alert-error" style="font-size: 15px;">
                            <span><i data-lucide="triangle-alert"></i></span>
                            <span>
                                <strong>No se pudo validar el pago:</strong> ${error.message || 'Intenta recargar en unos segundos.'}
                            </span>
                        </div>
                    `;

                    window.NavbarModule?.renderLucideIcons?.(box);
                } finally {
                    const cleanUrl = `${window.location.pathname}`;
                    window.history.replaceState({}, '', cleanUrl);
                }
            },

            esMovil() {
                return /Android|iPhone|iPad|iPod|Mobile/i.test(navigator.userAgent || '');
            },

            async guardarQREnGaleria(qrPayload, nombreEvento) {
                if (!this.esMovil()) {
                    alert('Esta opción solo está disponible en celular.');
                    return;
                }

                try {
                    const qrUrl = `https://api.qrserver.com/v1/create-qr-code/?size=900x900&data=${encodeURIComponent(qrPayload || '')}`;
                    const response = await fetch(qrUrl);
                    if (!response.ok) {
                        throw new Error('No se pudo generar la imagen QR');
                    }

                    const blob = await response.blob();
                    const safeName = String(nombreEvento || 'evento')
                        .toLowerCase()
                        .replace(/[^a-z0-9]+/g, '-')
                        .replace(/^-+|-+$/g, '');
                    const fileName = `qr-${safeName || 'boleto'}.png`;

                    if (navigator.canShare && navigator.share && window.File) {
                        const qrFile = new File([blob], fileName, { type: 'image/png' });
                        const canShareFiles = navigator.canShare({ files: [qrFile] });

                        if (canShareFiles) {
                            await navigator.share({
                                title: 'QR de boleto',
                                text: 'Guarda este QR en tu galeria',
                                files: [qrFile]
                            });
                            return;
                        }
                    }

                    const imageUrl = URL.createObjectURL(blob);
                    const link = document.createElement('a');
                    link.href = imageUrl;
                    link.download = fileName;
                    document.body.appendChild(link);
                    link.click();
                    document.body.removeChild(link);
                    URL.revokeObjectURL(imageUrl);
                } catch (error) {
                    alert(error.message || 'No se pudo guardar el QR');
                }
            },

            async cargarBoletos() {
                try {
                    const response = await api.misBoletos();
                    this.renderBoletos(response.boletos);
                } catch (error) {
                    console.error('Error:', error);
                    this.mostrarError('Error al cargar boletos');
                }
            },

            renderBoletos(boletos) {
                const container = document.querySelector('#boletosList');
                this.boletosPorId = {};
                
                if (boletos.length === 0) {
                    const params = new URLSearchParams(window.location.search);
                    const pago = params.get('pago');
                    container.innerHTML = `
                        <div style="grid-column: 1 / -1; text-align: center; padding: 40px;">
                            <p style="color: var(--text-light); font-size: 16px;">
                                ${pago === 'success'
                                    ? 'Tu pago fue recibido, pero aún no aparecen tus boletos. Esto puede tardar unos segundos.<br><button id="reintentarBoletos" class="btn btn-primary" style="margin-top: 20px;">Reintentar</button>'
                                    : 'No tienes boletos aún'}
                            </p>
                            <a href="../index.html" class="btn btn-primary btn-stripe-big" style="margin-top: 40px; font-size: 22px; padding: 28px 0; width: 100%; max-width: 600px; display: inline-block; background: #635bff; color: #fff; border-radius: 32px; font-weight: bold; letter-spacing: 1px;">Pagar con Stripe</a>
                        </div>
                    `;
                    if (pago === 'success') {
                        document.getElementById('reintentarBoletos').onclick = () => this.cargarBoletos();
                    }
                    return;
                }

                boletos.forEach((boleto) => {
                    const key = String(boleto.boleto_id || boleto.id_boleto || boleto.id || boleto.codigo_qr || '');
                    if (key) {
                        this.boletosPorId[key] = boleto;
                    }
                });

                container.innerHTML = boletos.map((boleto) => {
                    const qrPayload = this.construirPayloadQR(boleto);
                    const qrEscaped = qrPayload.replace(/'/g, "\\'");

                    return `
                    <div class="card boleto-card">
                        <div class="card-header">
                            <h3>${boleto.evento}</h3>
                            <small>${new Date(boleto.fecha_evento).toLocaleDateString()}</small>
                        </div>
                        <div class="boleto-body">
                            <p><strong>Tipo:</strong> ${boleto.tipo_boleto}</p>
                            <p><strong>Ubicación:</strong> ${boleto.ubicacion}</p>
                            <p><strong>Precio:</strong> $${parseFloat(boleto.precio_pagado).toFixed(2)}</p>
                            <p><strong>Estado:</strong> <span class="badge badge-${boleto.estado === 'pagado' ? 'success' : 'pending'}">${boleto.estado}</span></p>
                            
                            <div class="boleto-qr-box">
                                <p style="margin-bottom: 10px; color: #445a7f;">Tu código QR:</p>
                                <img
                                    src="https://api.qrserver.com/v1/create-qr-code/?size=180x180&data=${encodeURIComponent(qrPayload || boleto.codigo_qr || '')}"
                                    alt="QR del boleto"
                                    class="boleto-qr-image"
                                />
                                <code style="display: block; font-size: 14px; font-weight: 700; letter-spacing: 2px; color: #1d3557;">${boleto.codigo_qr || 'SIN-CODIGO'}</code>
                            </div>

                            <div class="boleto-actions">
                                <button class="btn btn-primary" onclick="MisBoletosModule.descargarBoletoPDF('${String(boleto.boleto_id || boleto.id_boleto || boleto.id || boleto.codigo_qr || '').replace(/'/g, "\\'")}')">Descargar boleto PDF</button>
                                ${this.esMovil() ? `<button class="btn btn-secondary" onclick="MisBoletosModule.guardarQREnGaleria('${qrEscaped}', '${String(boleto.evento || '').replace(/'/g, "\\'")}')">Guardar QR en galería</button>` : ''}
                                <button class="btn btn-secondary" onclick="location.href='detalle-boleto.html?id=${boleto.boleto_id || boleto.id_boleto || boleto.id}'">Ver Detalle</button>
                            </div>
                        </div>
                    </div>
                `;
                }).join('');
            },

            async descargarBoletoPDF(boletoId) {
                try {
                    const boleto = this.boletosPorId[String(boletoId)];
                    if (!boleto) {
                        throw new Error('No se encontro el boleto para descargar');
                    }

                    await window.BoletoPdf.abrirPdfBoleto(boleto);
                } catch (error) {
                    alert(error.message || 'No se pudo generar el PDF del boleto');
                }
            },

            mostrarError(mensaje) {
                const container = document.querySelector('#boletosList');
                container.innerHTML = `
                    <div style="grid-column: 1 / -1;">
                        <div class="alert alert-error">
                            <span><i data-lucide="triangle-alert"></i></span>
                            <span>${mensaje}</span>
                        </div>
                    </div>
                `;

                window.NavbarModule?.renderLucideIcons?.(container);
            }
        };

        // Inicializar
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', async () => {
                await MisBoletosModule.procesarRetornoMercadoPagoSiAplica();
                await MisBoletosModule.cargarBoletos();
            });
        } else {
            (async () => {
                await MisBoletosModule.procesarRetornoMercadoPagoSiAplica();
                await MisBoletosModule.cargarBoletos();
            })();
        }
    </script>

    <script src="../js/api.js"></script>
    <script src="../js/navbar.js"></script>
    <script src="../js/auth-guard.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="../js/boleto-pdf.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Confirmación de Compra - Eventos+</title>
    <link rel="icon" type="image/svg+xml" href="favicon.svg">
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/navbar.css">
    <style>
        body {
            background: #0a1b36;
            min-height: 100vh;
        }

        .confirmacion-wrapper {
            max-width: 520px;
            margin: 0 auto;
            padding: 24px 16px 48px;
        }

        /* --- Banner de agradecimiento --- */
        .gracias-banner {
            background: linear-gradient(135deg, #0e2549 0%, #162e5c 100%);
            border: 1px solid #1e3f7a;
            border-radius: 16px;
            padding: 32px 24px 28px;
            text-align: center;
            margin-bottom: 24px;
            position: relative;
            overflow: hidden;
        }

        .gracias-banner::before {
            content: '';
            position: absolute;
            inset: 0;
            background: radial-gradient(ellipse at 50% -20%, rgba(59, 130, 246, 0.18) 0%, transparent 70%);
            pointer-events: none;
        }

        .gracias-brand {
            font-size: 15px;
            font-weight: 700;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: #3b82f6;
            margin-bottom: 12px;
        }

        .gracias-title {
            font-size: 28px;
            font-weight: 800;
            color: #ffffff;
            margin: 0 0 10px;
            line-height: 1.2;
        }

        .gracias-subtitle {
            font-size: 15px;
            color: #94a3b8;
            margin: 0;
        }

        .gracias-icon {
            width: 64px;
            height: 64px;
            border-radius: 50%;
            background: linear-gradient(135deg, #1d4ed8, #3b82f6);
            display: flex;
            align-items: center;
            justify-content: center;
            margin: 0 auto 20px;
        }

        .gracias-icon svg {
            width: 32px;
            height: 32px;
            stroke: #ffffff;
            fill: none;
            stroke-width: 2.5;
            stroke-linecap: round;
            stroke-linejoin: round;
        }

        /* --- Tarjeta del boleto --- */
        .boleto-ticket {
            background: linear-gradient(160deg, #0e2549 0%, #112040 60%, #0a1b36 100%);
            border: 1px solid #1e3f7a;
            border-radius: 16px;
            overflow: hidden;
        }

        .boleto-ticket-header {
            background: linear-gradient(90deg, #1d3a6e, #162e5c);
            padding: 20px 24px 16px;
            border-bottom: 1px solid #1e3f7a;
        }

        .boleto-ticket-header .evento-nombre {
            font-size: 20px;
            font-weight: 800;
            color: #ffffff;
            margin: 0 0 4px;
            line-height: 1.3;
        }

        .boleto-ticket-header .evento-tipo {
            font-size: 13px;
            color: #64b5f6;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .boleto-ticket-body {
            padding: 20px 24px;
        }

        .boleto-fields {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 14px 20px;
            margin-bottom: 20px;
        }

        .boleto-field label {
            display: block;
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.2px;
            text-transform: uppercase;
            color: #4d7cbf;
            margin-bottom: 3px;
        }

        .boleto-field span {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: #dce7ff;
        }

        .boleto-divider {
            height: 1px;
            background: linear-gradient(90deg, transparent, #1e3f7a 30%, #1e3f7a 70%, transparent);
            margin: 20px 0;
        }

        /* --- QR area --- */
        .boleto-qr-section {
            text-align: center;
            padding: 8px 0 4px;
        }

        .boleto-qr-section .qr-label {
            font-size: 11px;
            font-weight: 700;
            letter-spacing: 1.5px;
            text-transform: uppercase;
            color: #4d7cbf;
            margin-bottom: 12px;
        }

        .boleto-qr-img {
            width: 148px;
            height: 148px;
            border-radius: 10px;
            background: #ffffff;
            padding: 8px;
            display: block;
            margin: 0 auto 12px;
        }

        .boleto-qr-code {
            font-size: 13px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #94a3b8;
            word-break: break-all;
        }

        /* --- Estado badge --- */
        .estado-badge {
            display: inline-block;
            padding: 3px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .estado-badge.pagado,
        .estado-badge.activo,
        .estado-badge.disponible {
            background: rgba(34, 197, 94, 0.15);
            color: #4ade80;
            border: 1px solid rgba(34, 197, 94, 0.3);
        }

        .estado-badge.usado,
        .estado-badge.utilizado {
            background: rgba(239, 68, 68, 0.15);
            color: #f87171;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }

        .estado-badge.pendiente {
            background: rgba(234, 179, 8, 0.15);
            color: #facc15;
            border: 1px solid rgba(234, 179, 8, 0.3);
        }

        /* --- Footer de la tarjeta --- */
        .boleto-ticket-footer {
            padding: 14px 24px 20px;
            text-align: center;
        }

        .boleto-ticket-footer .footer-brand {
            font-size: 12px;
            font-weight: 700;
            letter-spacing: 2px;
            color: #2d5096;
            text-transform: uppercase;
        }

        /* --- Estado de carga / error --- */
        .estado-container {
            text-align: center;
            padding: 48px 24px;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid #1e3f7a;
            border-top-color: #3b82f6;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .estado-container p {
            color: #64748b;
            font-size: 15px;
        }

        .error-icon {
            font-size: 40px;
            margin-bottom: 12px;
        }

        .error-title {
            font-size: 18px;
            font-weight: 700;
            color: #f87171;
            margin-bottom: 8px;
        }

        .error-msg {
            color: #64748b;
            font-size: 14px;
            margin-bottom: 20px;
        }

        .btn-volver {
            display: inline-block;
            padding: 10px 24px;
            background: #1d4ed8;
            color: #ffffff;
            border-radius: 8px;
            text-decoration: none;
            font-weight: 600;
            font-size: 14px;
            transition: background 0.2s;
        }

        .btn-volver:hover {
            background: #2563eb;
        }

        @media (max-width: 480px) {
            .boleto-fields {
                grid-template-columns: 1fr;
            }

            .gracias-title {
                font-size: 22px;
            }
        }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="container">
            <div class="navbar-content">
                <a href="index.html" class="navbar-brand">
                    <span class="navbar-logo-mark" aria-hidden="true"></span>
                    <span class="navbar-logo-text">eventos+</span>
                </a>
            </div>
        </div>
    </nav>

    <div class="confirmacion-wrapper">
        <div id="mainContent">
            <div class="estado-container">
                <div class="spinner"></div>
                <p>Cargando información del boleto…</p>
            </div>
        </div>
    </div>

    <script>
        const APP_API = 'https://eventos-s.vercel.app/api';

        function getBoletoId() {
            const params = new URLSearchParams(window.location.search);
            return (params.get('boleto') || '').trim();
        }

        function formatDate(value) {
            if (!value) return 'No disponible';
            const d = new Date(value);
            if (isNaN(d.getTime())) return 'No disponible';
            return d.toLocaleDateString('es-MX', {
                weekday: 'long', day: '2-digit', month: 'long', year: 'numeric'
            });
        }

        function formatTime(value) {
            if (!value) return '';
            const d = new Date(value);
            if (isNaN(d.getTime())) return '';
            return d.toLocaleTimeString('es-MX', { hour: '2-digit', minute: '2-digit' });
        }

        function estadoBadge(estado) {
            const e = String(estado || '').toLowerCase();
            const cls = ['usado', 'utilizado'].includes(e) ? 'usado'
                : ['pagado', 'activo', 'disponible'].includes(e) ? 'pagado'
                : 'pendiente';
            return `<span class="estado-badge ${cls}">${estado || 'Desconocido'}</span>`;
        }

        function renderBoleto(boleto) {
            const container = document.getElementById('mainContent');

            const fechaEvento = formatDate(boleto.fecha_evento);
            const horaEvento  = formatTime(boleto.fecha_evento);
            const fechaCompra = formatDate(boleto.fecha_compra);
            const codigoQR    = boleto.codigo_qr || '';
            const qrPayload   = `https://eventos-s.vercel.app/confirmacion-compra.html?boleto=${encodeURIComponent(boleto.boleto_id || '')}`;
            const qrSrc       = `https://api.qrserver.com/v1/create-qr-code/?size=300x300&data=${encodeURIComponent(qrPayload)}`;

            container.innerHTML = `
                <div class="gracias-banner">
                    <div class="gracias-icon">
                        <svg viewBox="0 0 24 24"><polyline points="20 6 9 17 4 12"></polyline></svg>
                    </div>
                    <p class="gracias-brand">eventos+</p>
                    <h1 class="gracias-title">¡Gracias por tu compra!</h1>
                    <p class="gracias-subtitle">Aquí tienes la información de tu boleto. Preséntalo en la entrada del evento.</p>
                </div>

                <div class="boleto-ticket">
                    <div class="boleto-ticket-header">
                        <p class="evento-nombre">${boleto.evento || 'Evento'}</p>
                        <p class="evento-tipo">${boleto.tipo_boleto || 'General'}</p>
                    </div>

                    <div class="boleto-ticket-body">
                        <div class="boleto-fields">
                            <div class="boleto-field">
                                <label>Fecha</label>
                                <span>${fechaEvento}</span>
                            </div>
                            ${horaEvento ? `<div class="boleto-field">
                                <label>Hora</label>
                                <span>${horaEvento}</span>
                            </div>` : ''}
                            <div class="boleto-field">
                                <label>Ubicación</label>
                                <span>${boleto.ubicacion || 'No disponible'}</span>
                            </div>
                            <div class="boleto-field">
                                <label>Comprador</label>
                                <span>${boleto.usuario_nombre || 'No disponible'}</span>
                            </div>
                            <div class="boleto-field">
                                <label>Fecha de compra</label>
                                <span>${fechaCompra}</span>
                            </div>
                            <div class="boleto-field">
                                <label>Estado</label>
                                <span>${estadoBadge(boleto.estado_boleto)}</span>
                            </div>
                        </div>

                        <div class="boleto-divider"></div>

                        <div class="boleto-qr-section">
                            <p class="qr-label">Código QR de acceso</p>
                            <img
                                src="${qrSrc}"
                                alt="Código QR del boleto"
                                class="boleto-qr-img"
                            />
                            ${codigoQR ? `<p class="boleto-qr-code">${codigoQR}</p>` : ''}
                        </div>
                    </div>

                    <div class="boleto-ticket-footer">
                        <p class="footer-brand">eventos+ · boleto oficial de acceso</p>
                    </div>
                </div>
            `;
        }

        function renderError(mensaje) {
            const container = document.getElementById('mainContent');
            container.innerHTML = `
                <div class="estado-container">
                    <div class="error-icon">❌</div>
                    <p class="error-title">No se pudo cargar el boleto</p>
                    <p class="error-msg">${mensaje}</p>
                    <a href="index.html" class="btn-volver">Ir al inicio</a>
                </div>
            `;
        }

        async function init() {
            const boletoId = getBoletoId();

            if (!boletoId || isNaN(Number(boletoId))) {
                renderError('No se encontró el identificador del boleto en la URL.');
                return;
            }

            try {
                const res = await fetch(`${APP_API}/boletos/detalle-publico/${encodeURIComponent(boletoId)}`);
                const data = await res.json();

                if (!res.ok || !data.success) {
                    renderError(data.error || 'No se encontró el boleto solicitado.');
                    return;
                }

                renderBoleto(data.boleto);
            } catch (err) {
                console.error('Error al cargar boleto:', err);
                renderError('Error de conexión. Verifica tu internet e intenta de nuevo.');
            }
        }

        init();
    </script>
</body>
</html>
